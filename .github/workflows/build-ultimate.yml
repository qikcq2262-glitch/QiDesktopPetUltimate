name: Build Qi Pet from uploaded ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate and extract source ZIP
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*.zip' | head -n 1)"
          test -n "$ZIP_FILE" || { echo '仓库根目录没有找到 ZIP 源码包'; exit 1; }
          rm -rf extracted
          mkdir extracted
          unzip -q -o "$ZIP_FILE" -d extracted
          PROJECT
